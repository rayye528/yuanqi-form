<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>元启漫剧 投稿表单</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
body{background:#f5f7fa;padding:20px}
.page-title{text-align:center;font-size:28px;margin:30px 0}
.container{max-width:1000px;margin:0 auto;display:flex;gap:25px;background:#fff;padding:30px;border-radius:12px}
.rules-box{flex:1;background:#fef2f2;padding:25px;border-radius:8px;color:#d32f2f}
.rules-box .title{font-weight:bold;margin-bottom:15px;text-align:center}
.rules-box .text{line-height:1.8}
.form-box{flex:2}
.item{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-weight:bold}
input,textarea{width:100%;padding:15px;border:1px solid #ddd;border-radius:8px;font-size:16px}
textarea{min-height:120px}
#submitBtn{padding:16px 60px;background:#27ae60;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer}
#submitBtn:disabled{background:#999}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:20px 40px;border-radius:10px;display:none;z-index:999}
</style>
</head>
<body>
<h1 class="page-title">元启漫剧 投稿表单</h1>
<div class="container">
  <div class="rules-box">
    <div class="title">投稿规范</div>
    <div class="text">
      每集不能超过500MB<br>
      命名：XX第1集、XX-第2集<br>
      无水印、1080P、码率>4、CBR<br>
      网盘包含：视频、工程文件10张、封面、人物形象照
    </div>
  </div>
  <div class="form-box">
    <div class="item"><label>剧名</label><input id="dramaName"></div>
    <div class="item"><label>总集数</label><input id="totalEpisodes"></div>
    <div class="item"><label>总时长(分钟)</label><input id="totalDuration"></div>
    <div class="item"><label>男主名</label><input id="maleLeadName"></div>
    <div class="item"><label>男主简介</label><textarea id="maleLeadIntro"></textarea></div>
    <div class="item"><label>女主名</label><input id="femaleLeadName"></div>
    <div class="item"><label>女主简介</label><textarea id="femaleLeadIntro"></textarea></div>
    <div class="item"><label>视频简介</label><textarea id="videoIntro"></textarea></div>
    <div class="item"><label>网盘链接</label><input id="netdiskLink"></div>
    <button id="submitBtn" onclick="submit()">提交投稿</button>
  </div>
</div>
<div id="toast">提交成功，正在跳转…</div>

<script>
function submit() {
  const dramaName = document.getElementById("dramaName").value.trim();
  const totalEpisodes = document.getElementById("totalEpisodes").value.trim();
  const totalDuration = document.getElementById("totalDuration").value.trim();
  const maleLeadName = document.getElementById("maleLeadName").value.trim();
  const maleLeadIntro = document.getElementById("maleLeadIntro").value.trim();
  const femaleLeadName = document.getElementById("femaleLeadName").value.trim();
  const femaleLeadIntro = document.getElementById("femaleLeadIntro").value.trim();
  const videoIntro = document.getElementById("videoIntro").value.trim();
  const netdiskLink = document.getElementById("netdiskLink").value.trim();

  if (!dramaName) {
    alert("请填写剧名！");
    return;
  }

  const body = `
## 剧名
${dramaName}

## 总集数
${totalEpisodes}

## 总时长(分钟)
${totalDuration}

## 男主名
${maleLeadName}

## 男主简介
${maleLeadIntro}

## 女主名
${femaleLeadName}

## 女主简介
${femaleLeadIntro}

## 视频简介
${videoIntro}

## 网盘链接
${netdiskLink}
`;

  const title = encodeURIComponent("投稿：" + dramaName);
  const bodyEncoded = encodeURIComponent(body);

  // 👇 这是最终正确的跳转链接
  const url = `https://github.com/rayye528/yuanqi/issues/new?template=tougao.md&title=${title}&body=${bodyEncoded}`;

  document.getElementById("toast").style.display = "block";

  setTimeout(() => {
    window.open(url, "_blank");
    document.getElementById("toast").style.display = "none";
  }, 800);
}
</script>
</body>
</html>
