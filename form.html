<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>元启漫剧 投稿表单</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
body{background:#f5f7fa;padding:20px}
.page-title{text-align:center;font-size:28px;margin:30px 0}
.container{max-width:1000px;margin:0 auto;display:flex;gap:25px;background:#fff;padding:30px;border-radius:12px}
.rules-box{flex:1;background:#fef2f2;padding:25px;border-radius:8px;color:#d32f2f}
.rules-box .title{font-weight:bold;margin-bottom:15px;text-align:center}
.rules-box .text{line-height:1.8}
.form-box{flex:2}
.item{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-weight:bold}
input,textarea{width:100%;padding:15px;border:1px solid #ddd;border-radius:8px;font-size:16px}
textarea{min-height:120px}
#submitBtn{padding:16px 60px;background:#27ae60;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer}
#submitBtn:disabled{background:#999}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:20px 40px;border-radius:10px;display:none;z-index:9999}
#loginTip{color:#666;margin-top:10px;font-size:14px}
</style>
</head>
<body>
<h1 class="page-title">元启漫剧 投稿表单</h1>
<div class="container">
  <div class="rules-box">
    <div class="title">投稿规范</div>
    <div class="text">
      每集不能超过500MB<br>
      命名：XX第1集、XX-第2集<br>
      无水印、1080P、码率>4、CBR<br>
      网盘包含：视频、工程文件10张、封面、人物形象照
    </div>
  </div>
  <div class="form-box">
    <div class="item"><label>剧名</label><input id="dramaName" required></div>
    <div class="item"><label>总集数</label><input id="totalEpisodes" required></div>
    <div class="item"><label>总时长(分钟)</label><input id="totalDuration" required></div>
    <div class="item"><label>男主名</label><input id="maleLeadName" required></div>
    <div class="item"><label>男主简介</label><textarea id="maleLeadIntro" required></textarea></div>
    <div class="item"><label>女主名</label><input id="femaleLeadName" required></div>
    <div class="item"><label>女主简介</label><textarea id="femaleLeadIntro" required></textarea></div>
    <div class="item"><label>视频简介</label><textarea id="videoIntro" required></textarea></div>
    <div class="item"><label>网盘链接</label><input id="netdiskLink" required></div>
    <button id="submitBtn" onclick="submit()">提交投稿</button>
    <div id="loginTip">📌 提交前请确保已登录GitHub账号</div>
  </div>
</div>
<div id="toast">正在跳转至GitHub提交页面...</div>

<script>
function submit() {
  const btn = document.getElementById("submitBtn");
  const toast = document.getElementById("toast");

  // 1. 校验必填项
  const fields = [
    {id: "dramaName", name: "剧名"},
    {id: "totalEpisodes", name: "总集数"},
    {id: "totalDuration", name: "总时长"},
    {id: "maleLeadName", name: "男主名"},
    {id: "maleLeadIntro", name: "男主简介"},
    {id: "femaleLeadName", name: "女主名"},
    {id: "femaleLeadIntro", name: "女主简介"},
    {id: "videoIntro", name: "视频简介"},
    {id: "netdiskLink", name: "网盘链接"}
  ];

  for (const field of fields) {
    const value = document.getElementById(field.id).value.trim();
    if (!value) {
      alert(`请填写【${field.name}】`);
      return;
    }
  }

  // 2. 读取表单数据
  const dramaName = document.getElementById("dramaName").value;
  const totalEpisodes = document.getElementById("totalEpisodes").value;
  const totalDuration = document.getElementById("totalDuration").value;
  const maleLeadName = document.getElementById("maleLeadName").value;
  const maleLeadIntro = document.getElementById("maleLeadIntro").value;
  const femaleLeadName = document.getElementById("femaleLeadName").value;
  const femaleLeadIntro = document.getElementById("femaleLeadIntro").value;
  const videoIntro = document.getElementById("videoIntro").value;
  const netdiskLink = document.getElementById("netdiskLink").value;
  const submitTime = new Date().toLocaleString();

  // 3. 拼接Issue内容（转义特殊字符，避免链接失效）
  const body = encodeURIComponent(`
**剧名**: ${dramaName}
**总集数**: ${totalEpisodes}
**总时长**: ${totalDuration} 分钟
**男主**: ${maleLeadName}
**男主简介**: ${maleLeadIntro}
**女主**: ${femaleLeadName}
**女主简介**: ${femaleLeadIntro}
**视频简介**: ${videoIntro}
**网盘链接**: ${netdiskLink}
**提交时间**: ${submitTime}
  `);
  const title = encodeURIComponent("投稿：" + dramaName);

  // 4. 构建跳转链接（直接拼接，避免URL对象的兼容性问题）
  const url = `https://github.com/rayye528/yuanqi/issues/new?title=${title}&body=${body}`;

  // 5. 立即跳转（去掉延时，避免弹窗拦截）
  btn.disabled = true;
  btn.innerText = "提交中...";
  toast.style.display = "block";

  // 核心修复：立即打开新标签，不延时
  const newTab = window.open(url, "_blank");
  
  // 检测弹窗是否被拦截
  if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
    alert("⚠️ 弹窗被浏览器拦截！请允许弹窗后重新提交，或手动复制链接访问：\n" + url);
    btn.disabled = false;
    btn.innerText = "提交投稿";
    toast.style.display = "none";
    return;
  }

  // 6. 完成跳转后的状态恢复
  setTimeout(() => {
    toast.style.display = "none";
    btn.disabled = false;
    btn.innerText = "提交投稿";
  }, 2000);
}
</script>
</body>
</html>
